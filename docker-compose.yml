services:

  # ── FRONTEND ──────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: echofy-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── REDIS (compartido) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echofy-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── AUTH  8081 ────────────────────────────────────────
  auth:
    build: ./services/auth
    container_name: echofy-auth
    ports:
      - "8081:3000"
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    env_file:
      - ./services/auth/.env
    restart: unless-stopped

  # ── SONGS  8082 ───────────────────────────────────────
  songs:
    build: ./services/songs
    container_name: echofy-songs
    ports:
      - "8082:3000"
    volumes:
      - ./services/songs:/app
      - /app/node_modules
    env_file:
      - ./services/songs/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PLAYER  8083 ──────────────────────────────────────
  player:
    build: ./services/player
    container_name: echofy-player
    ports:
      - "8083:3000"
    volumes:
      - ./services/player:/app
      - /app/node_modules
    env_file:
      - ./services/player/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PLAYLISTS  8084 ───────────────────────────────────
  playlists:
    build: ./services/playlists
    container_name: echofy-playlists
    ports:
      - "8084:3000"
    volumes:
      - ./services/playlists:/app
      - /app/node_modules
    env_file:
      - ./services/playlists/.env
    restart: unless-stopped

  # ── FAVORITES  8085 ───────────────────────────────────
  favorites:
    build: ./services/favorites
    container_name: echofy-favorites
    ports:
      - "8085:3000"
    volumes:
      - ./services/favorites:/app
      - /app/node_modules
    env_file:
      - ./services/favorites/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── STATS  8086 ───────────────────────────────────────
  stats:
    build: ./services/stats
    container_name: echofy-stats
    ports:
      - "8086:3000"
    volumes:
      - ./services/stats:/app
      - /app/node_modules
    env_file:
      - ./services/stats/.env
    depends_on:
      - redis
    restart: unless-stopped

# ── LYRICS  8087 ──────────────────────────────────────
  lyrics:
    build: ./services/lyrics
    container_name: echofy-lyrics
    ports:
      - "8087:3000"
    volumes:
      - ./services/lyrics:/app
      - /app/node_modules
    env_file:
      - ./services/lyrics/.env
    depends_on:
      - redis
    restart: unless-stopped

# ── INGESTOR ──────────────────────────────────────

  #ingestor:
  #   build: ./services/ingestor
  #   container_name: echofy-ingestor
     # Sin ports: solo accesible internamente
  #   volumes:
  #     - ./services/ingestor:/app
  #     - ./services/ingestor/downloads:/app/downloads
  #     - ./services/ingestor/service-account.json:/app/service-account.json
  #   env_file:
  #     - ./services/ingestor/.env
  #restart: unless-stopped

# ── AI DJ SERVICE 8090 ─────────────────────────────────
  ai:
    build: ./services/ai
    container_name: echofy-ai
    ports:
      - "8090:8090"
    volumes:
      - ./services/ai:/app
    env_file:
      - ./services/ai/.env
    depends_on:
      - redis
      - ollama
    restart: unless-stopped

  # ── OLLAMA CONTAINER ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: echofy-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      # Fix para GPU discovery timeout en GPUs Blackwell (RTX 5060 Ti)
      - OLLAMA_GPU_DISCOVERY_TIMEOUT=120
      # Mantener modelos en VRAM entre peticiones (evita recargas)
      - OLLAMA_KEEP_ALIVE=24h
      # Aumentar timeout de carga del servidor llama
      - OLLAMA_LOAD_TIMEOUT=600
      # Número de capas en GPU — forzar todas a GPU
      - OLLAMA_NUM_GPU=999
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── OLLAMA INITIALIZER (descargar modelos automáticamente) ────────
  ollama-init:
    image: curlimages/curl:latest
    container_name: echofy-ollama-init
    depends_on:
      - ollama
    entrypoint:
      - sh
      - -c
      - |
        echo '⏳ Esperando a que Ollama levante...'
        until curl -sf http://echofy-ollama:11434/api/tags > /dev/null 2>&1; do
          sleep 3
        done
        echo '✅ Ollama listo. Descargando gemma2:2b...'
        curl -sf --max-time 1800 \
          -X POST http://echofy-ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d '{"name":"gemma2:2b","stream":false}'
        echo '📥 Descargando nomic-embed-text...'
        curl -sf --max-time 600 \
          -X POST http://echofy-ollama:11434/api/pull \
          -H 'Content-Type: application/json' \
          -d '{"name":"nomic-embed-text","stream":false}'
        echo '🎉 Modelos listos.'
    restart: "no"

  redis-ai:
    image: redis:7-alpine
    container_name: redis-ai
    restart: always
    #ports:
    #  - "6379:6379"

  subscriptions:
    build: ./services/subscriptions
    container_name: echofy-subscriptions
    ports:
      - "8088:3000"
    volumes:
      - ./services/subscriptions:/app
      - /app/node_modules
    env_file:
      - ./services/subscriptions/.env
    depends_on:
      - redis
    restart: unless-stopped

  artists:
    build: ./services/artists
    container_name: echofy-artists
    ports:
      - "8089:3000"
    volumes:
      - ./services/artists:/app
      - /app/node_modules
    env_file:
      - ./services/artists/.env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  ollama_models:

