services:

  # ── FRONTEND ──────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: echofy-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # ── REDIS (compartido) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: echofy-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  # ── AUTH  8081 ────────────────────────────────────────
  auth:
    build: ./services/auth
    container_name: echofy-auth
    ports:
      - "8081:3000"
    volumes:
      - ./services/auth:/app
      - /app/node_modules
    env_file:
      - ./services/auth/.env
    restart: unless-stopped

  # ── SONGS  8082 ───────────────────────────────────────
  songs:
    build: ./services/songs
    container_name: echofy-songs
    ports:
      - "8082:3000"
    volumes:
      - ./services/songs:/app
      - /app/node_modules
    env_file:
      - ./services/songs/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PLAYER  8083 ──────────────────────────────────────
  player:
    build: ./services/player
    container_name: echofy-player
    ports:
      - "8083:3000"
    volumes:
      - ./services/player:/app
      - /app/node_modules
    env_file:
      - ./services/player/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── PLAYLISTS  8084 ───────────────────────────────────
  playlists:
    build: ./services/playlists
    container_name: echofy-playlists
    ports:
      - "8084:3000"
    volumes:
      - ./services/playlists:/app
      - /app/node_modules
    env_file:
      - ./services/playlists/.env
    restart: unless-stopped

  # ── FAVORITES  8085 ───────────────────────────────────
  favorites:
    build: ./services/favorites
    container_name: echofy-favorites
    ports:
      - "8085:3000"
    volumes:
      - ./services/favorites:/app
      - /app/node_modules
    env_file:
      - ./services/favorites/.env
    depends_on:
      - redis
    restart: unless-stopped

  # ── STATS  8086 ───────────────────────────────────────
  stats:
    build: ./services/stats
    container_name: echofy-stats
    ports:
      - "8086:3000"
    volumes:
      - ./services/stats:/app
      - /app/node_modules
    env_file:
      - ./services/stats/.env
    depends_on:
      - redis
    restart: unless-stopped

# ── LYRICS  8087 ──────────────────────────────────────
  lyrics:
    build: ./services/lyrics
    container_name: echofy-lyrics
    ports:
      - "8087:3000"
    volumes:
      - ./services/lyrics:/app
      - /app/node_modules
    env_file:
      - ./services/lyrics/.env
    depends_on:
      - redis
    restart: unless-stopped